services:
  step-converter:
    build:
      context: ./step-converter
      dockerfile: Dockerfile
    volumes:
      - step_uploads:/tmp/uploads
    environment:
      MAX_UPLOAD_SIZE_MB: 50
      LINEAR_DEFLECTION: 0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kalkulation
      POSTGRES_PASSWORD: kalkulation
      POSTGRES_DB: kalkulation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host 5433 avoids colliding with the WERKSCODE Postgres on 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalkulation -d kalkulation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Host 3100 avoids colliding with the WERKSCODE Nuxt app on 3000
    ports:
      - "3100:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      DATABASE_URL: postgres://kalkulation:kalkulation@db:5432/kalkulation
      NUXT_STEP_CONVERTER_URL: http://step-converter:8000
    depends_on:
      db:
        condition: service_healthy
      step-converter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  step_uploads:
