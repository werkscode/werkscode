services:
  step-converter:
    build:
      context: ./step-converter
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - step_uploads:/tmp/uploads
    environment:
      MAX_UPLOAD_SIZE_MB: 50
      LINEAR_DEFLECTION: 0.1

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kalkulation
      POSTGRES_PASSWORD: kalkulation
      POSTGRES_DB: kalkulation
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    # Host 5433 avoids colliding with the WERKSCODE Postgres on 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalkulation -d kalkulation"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # Host 3100 avoids colliding with the WERKSCODE Nuxt app on 3000
    ports:
      - "3100:3000"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      DATABASE_URL: postgres://kalkulation:kalkulation@db:5432/kalkulation
      NUXT_STEP_CONVERTER_URL: http://step-converter:8000
      # Full save/setup/history when cloning and running locally
      NUXT_PUBLIC_PERSISTENCE_ENABLED: "true"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      step-converter:
        condition: service_started
    command: pnpm dev --host 0.0.0.0

volumes:
  postgres_dev_data:
  step_uploads:
