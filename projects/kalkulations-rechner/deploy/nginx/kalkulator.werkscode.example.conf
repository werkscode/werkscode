# Kalkulations-Rechner — reverse proxy for a public subdomain
#
# Copy into your nginx conf.d and adjust:
#   - server_name (e.g. kalkulator.werkscode.de)
#   - SSL certificate paths
#   - upstream port if you change docker-compose.prod.yml
#
# Upstream (bind on localhost only; see docker-compose.prod.yml):
#   Nuxt/Nitro (app + API): 127.0.0.1:8041

server {
  listen 80;
  listen [::]:80;
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  # Replace with your certificate paths (e.g. Let's Encrypt):
  # ssl_certificate     /etc/letsencrypt/live/kalkulator.example.com/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/kalkulator.example.com/privkey.pem;

  server_name kalkulator.example.com;

  if ($scheme = http) {
    return 301 https://$server_name$request_uri;
  }

  client_max_body_size 12m;

  # API (Nitro) — no trailing-slash redirect (breaks POST routes like /api/powder-coating/quote)
  location /api/ {
    proxy_pass http://127.0.0.1:8041;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 240s;
    proxy_connect_timeout 240s;
  }

  # Nuxt app (SSR) — trailing-slash redirect only here, not for /api/
  location / {
    rewrite ^([^.]*[^/])$ $scheme://$host$1/ permanent;

    proxy_pass http://127.0.0.1:8041;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 240s;
    proxy_connect_timeout 240s;
  }
}
